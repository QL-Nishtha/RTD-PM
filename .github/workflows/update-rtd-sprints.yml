name: Update RTD sprint Start/End dates
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-project-dates:
    runs-on: ubuntu-latest
    env:
      GITHUB_API: "https://api.github.com/graphql"
      USER_LOGIN: "QL-Nishtha"
      PROJECT_NUMBER: "1"
    steps:
      - name: Checkout (for auditability)
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update Project V2 sprint dates
        env:
          PAT: ${{ secrets.PROJECT_PAT }}
        run: |
          set -euo pipefail

          # Sprints and dates parsed from CSV
          sprints_json='[
            {"name":"Sprint 1","label":"Sprint 1","start":"2026-05-04","end":"2026-05-15"},
            {"name":"Sprint 2","label":"Sprint 2","start":"2026-05-18","end":"2026-05-29"},
            {"name":"Sprint 3","label":"Sprint 3","start":"2026-06-01","end":"2026-06-12"},
            {"name":"Sprint 4","label":"Sprint 4","start":"2026-06-15","end":"2026-06-26"}
          ]'

          # Helper to call GraphQL
          graphql() {
            local payload="$1"
            curl -s -H "Authorization: Bearer $PAT" -H "Content-Type: application/json" -X POST -d "$payload" "$GITHUB_API"
          }

          # 1) Get project info (id, fields, items)
          project_resp="$(graphql '{"query":"query($login:String!, $num:Int!){ user(login:$login){ projectV2(number:$num){ id title fields(first:100){ nodes{ id name dataType } } items(first:100){ nodes{ id content{ __typename ... on DraftIssue{ title } ... on Issue{ title number url } } } } } } }","variables":{"login":"'"${USER_LOGIN}"'","num":'"${PROJECT_NUMBER}"'}}')"

          project_id="$(echo "$project_resp" | jq -r '.data.user.projectV2.id // empty')"
          if [ -z "$project_id" ]; then
            echo "ERROR: Could not find project for user $USER_LOGIN number $PROJECT_NUMBER"
            echo "Response: $project_resp"
            exit 1
          fi
          echo "Found project id: $project_id"

          # Build maps of existing fields and items
          declare -A field_id_by_name
          while IFS= read -r fld; do
            name="$(echo "$fld" | jq -r '.name')"
            id="$(echo "$fld" | jq -r '.id')"
            field_id_by_name["$name"]="$id"
          done < <(echo "$project_resp" | jq -c '.data.user.projectV2.fields.nodes[]')

          # Function to create a date field if missing
          ensure_date_field() {
            local fname="$1"
            local fid="${field_id_by_name[$fname]:-}"
            if [ -n "$fid" ]; then
              echo "Field '$fname' exists: $fid"
              printf '%s' "$fid"
              return
            fi
            echo "Creating date field '$fname'..."
            addfld_resp="$(graphql '{"query":"mutation($input:AddProjectV2FieldInput!){ addProjectV2Field(input:$input){ projectV2Field{ id name } }}","variables":{"input":{"projectId":"'"$project_id"'","name":"'"$fname"'","dataType":"DATE"}}}')"
            fid="$(echo "$addfld_resp" | jq -r '.data.addProjectV2Field.projectV2Field.id // empty')"
            if [ -z "$fid" ]; then
              echo "ERROR creating field $fname"
              echo "$addfld_resp"
              exit 1
            fi
            echo "Created field '$fname' -> $fid"
            field_id_by_name["$fname"]="$fid"
            printf '%s' "$fid"
          }

          # Ensure "Start date" and "End date" exist
          start_field_id="$(ensure_date_field "Start date")"
          end_field_id="$(ensure_date_field "End date")"

          # Helper to get or create an item for a sprint label
          get_or_create_item() {
            local label="$1"
            items_resp="$(graphql '{"query":"query($login:String!, $num:Int!){ user(login:$login){ projectV2(number:$num){ items(first:100){ nodes{ id content{ __typename ... on DraftIssue{ title } ... on Issue{ title } } } } } } }","variables":{"login":"'"${USER_LOGIN}"'","num":'"${PROJECT_NUMBER}"'}}')"
            found_id="$(echo "$items_resp" | jq -r --arg label "$label" '.data.user.projectV2.items.nodes[] | . as $n | (.content.__typename as $t | if $t == "DraftIssue" then .content.title elif $t == "Issue" then .content.title else "" end) as $title | select($title==$label) | $n.id' | head -n1 || true)"
            if [ -n "$found_id" ]; then
              printf '%s' "$found_id"
              return
            fi
            echo "Creating project item with title: $label"
            add_item_resp="$(graphql '{"query":"mutation($input:AddProjectV2ItemInput!){ addProjectV2Item(input:$input){ item{ id } }}","variables":{"input":{"projectId":"'"$project_id"'","title":"'"$label"'"}}}')"
            new_id="$(echo "$add_item_resp" | jq -r '.data.addProjectV2Item.item.id // empty')"
            if [ -z "$new_id" ]; then
              echo "ERROR creating item $label"
              echo "$add_item_resp"
              exit 1
            fi
            echo "Created item id $new_id for title $label"
            printf '%s' "$new_id"
          }

          # Function to set date field on an item
          set_date_field() {
            local item_id="$1"
            local field_id="$2"
            local date="$3"
            upd_resp="$(graphql '{"query":"mutation($input:UpdateProjectV2ItemFieldValueInput!){ updateProjectV2ItemFieldValue(input:$input){ projectV2Item{ id } }}","variables":{"input":{"projectId":"'"$project_id"'","itemId":"'"$item_id"'","fieldId":"'"$field_id"'","value":{"date":"'"$date"'"}}}}')"
            ok="$(echo "$upd_resp" | jq -r '.data.updateProjectV2ItemFieldValue.projectV2Item.id // empty')"
            if [ -z "$ok" ]; then
              echo "ERROR setting date $date on item $item_id field $field_id"
              echo "$upd_resp"
              exit 1
            fi
            echo "Set date $date on item $item_id field $field_id"
          }

          # Iterate sprints
          echo "$sprints_json" | jq -c '.[]' | while read -r s; do
            label="$(echo "$s" | jq -r '.label')"
            start="$(echo "$s" | jq -r '.start')"
            end="$(echo "$s" | jq -r '.end')"

            echo "Processing $label ($start → $end)..."
            item_id="$(get_or_create_item "$label")"
            set_date_field "$item_id" "$start_field_id" "$start"
            set_date_field "$item_id" "$end_field_id" "$end"
          done

          echo "All sprints processed. Please verify in Project: https://github.com/users/${USER_LOGIN}/projects/${PROJECT_NUMBER}"
